---
- name: Weekly Mikrus Server Maintenance
  hosts: mikrus
  become: true
  gather_facts: true

  vars:
    maintenance_log: "/var/log/mikrus-maintenance.log"
    max_log_size: "10M"
    log_retention_days: 30
    target_alpine_version: "3.23"
    auto_upgrade_alpine: true

  tasks:
    - name: Create maintenance log entry
      ansible.builtin.lineinfile:
        path: "{{ maintenance_log }}"
        line: "{{ ansible_date_time.iso8601 }} - Starting weekly maintenance"
        create: yes
        state: present
      tags: [maintenance]

    # -------------------------
    # Alpine Version Check
    # -------------------------
    - name: Get current Alpine version
      ansible.builtin.shell: cat /etc/alpine-release
      register: current_alpine_version
      changed_when: false
      tags: [system, version, check]

    - name: Parse current Alpine version
      ansible.builtin.set_fact:
        current_version: "{{ current_alpine_version.stdout | regex_replace('^([0-9]+)\\.([0-9]+)\\.([0-9]+).*$', '\\1.\\2') }}"
      tags: [system, version, check]

    - name: Get latest stable Alpine version
      ansible.builtin.uri:
        url: "https://dl-cdn.alpinelinux.org/alpine/latest-stable/releases/x86_64/latest-releases.yaml"
        method: GET
      register: alpine_releases
      failed_when: false
      tags: [system, version, check]

    - name: Parse latest stable version from API
      ansible.builtin.set_fact:
        latest_stable_version: "{{ alpine_releases.content | regex_search('version: ([0-9]+\\.[0-9]+)\\.[0-9]+', '\\1') | default(target_alpine_version) }}"
      when: alpine_releases.status == 200
      tags: [system, version, check]

    - name: Fallback to target version if API fails
      ansible.builtin.set_fact:
        latest_stable_version: "{{ target_alpine_version }}"
      when: alpine_releases.status != 200
      tags: [system, version, check]

    - name: Check if Alpine version upgrade is needed
      ansible.builtin.set_fact:
        alpine_upgrade_needed: "{{ current_version != latest_stable_version }}"
      tags: [system, version, check]

    - name: Log Alpine version status
      ansible.builtin.lineinfile:
        path: "{{ maintenance_log }}"
        line: "{{ ansible_date_time.iso8601 }} - Alpine version check: {{ current_version }} (latest stable: {{ latest_stable_version }}) {{ alpine_upgrade_needed | ternary('UPGRADE NEEDED', 'UP TO DATE') }}"
      tags: [maintenance, system, version]

    - name: Display Alpine version information
      ansible.builtin.debug:
        msg: |
          Alpine Version Status:
          - Current: {{ current_version }}
          - Latest stable: {{ latest_stable_version }}
          - Upgrade needed: {{ alpine_upgrade_needed }}
          - Auto-upgrade enabled: {{ auto_upgrade_alpine }}
      tags: [system, version, check]

    - name: Create backup directory for Alpine upgrade
      ansible.builtin.file:
        path: "/var/backups/alpine-upgrade-{{ ansible_date_time.iso8601 }}"
        state: directory
        mode: '0755'
      when: alpine_upgrade_needed and auto_upgrade_alpine
      tags: [system, version, upgrade]

    - name: Backup package list before Alpine upgrade
      ansible.builtin.shell: apk info | sort > /var/backups/alpine-upgrade-{{ ansible_date_time.iso8601 }}/packages-before.txt
      when: alpine_upgrade_needed and auto_upgrade_alpine
      tags: [system, version, upgrade]

    - name: Update repositories to latest stable
      ansible.builtin.lineinfile:
        path: /etc/apk/repositories
        regexp: '^#?http.*alpine.*v[0-9]+\.[0-9]+.*'
        line: 'https://dl-cdn.alpinelinux.org/alpine/latest-stable/main'
        backup: yes
      when: alpine_upgrade_needed and auto_upgrade_alpine
      register: repo_update
      tags: [system, version, upgrade]

    - name: Add community repository for latest stable
      ansible.builtin.lineinfile:
        path: /etc/apk/repositories
        line: 'https://dl-cdn.alpinelinux.org/alpine/latest-stable/community'
        create: yes
      when: alpine_upgrade_needed and auto_upgrade_alpine and repo_update.changed
      tags: [system, version, upgrade]

    - name: Update package index with new repositories
      community.general.apk:
        update_cache: true
      when: alpine_upgrade_needed and auto_upgrade_alpine
      register: apk_update
      tags: [system, version, upgrade]

    - name: Upgrade apk package manager first
      community.general.apk:
        name:
          - apk-tools
        state: latest
      when: alpine_upgrade_needed and auto_upgrade_alpine
      register: apk_tools_upgrade
      tags: [system, version, upgrade]

    - name: Perform full Alpine system upgrade
      community.general.apk:
        upgrade: true
      when: alpine_upgrade_needed and auto_upgrade_alpine
      register: alpine_system_upgrade
      tags: [system, version, upgrade]

    - name: Log Alpine upgrade results
      ansible.builtin.lineinfile:
        path: "{{ maintenance_log }}"
        line: "{{ ansible_date_time.iso8601 }} - Alpine OS upgrade performed: {{ alpine_system_upgrade.changed | ternary('SUCCESS', 'NO CHANGES') }}"
      when: alpine_upgrade_needed and auto_upgrade_alpine
      tags: [maintenance, system, version]

    - name: Reboot after Alpine upgrade
      ansible.builtin.reboot:
        reboot_timeout: 600
      when: alpine_upgrade_needed and auto_upgrade_alpine and (alpine_system_upgrade.changed or apk_tools_upgrade.changed)
      tags: [system, version, upgrade]

    - name: Wait for SSH after Alpine upgrade reboot
      ansible.builtin.wait_for_connection:
        timeout: 600
      when: alpine_upgrade_needed and auto_upgrade_alpine and (alpine_system_upgrade.changed or apk_tools_upgrade.changed)
      tags: [system, version, upgrade]

    - name: Alert about available Alpine upgrade
      ansible.builtin.lineinfile:
        path: "{{ maintenance_log }}"
        line: "{{ ansible_date_time.iso8601 }} - ALERT: Alpine OS upgrade available ({{ current_version }} -> {{ latest_stable_version }}). Run with -e 'auto_upgrade_alpine=true' to upgrade."
      when: alpine_upgrade_needed and not auto_upgrade_alpine
      tags: [maintenance, system, alert]

    # -------------------------
    # System Updates
    # -------------------------
    - name: Update Alpine package index
      community.general.apk:
        update_cache: true
      register: apk_update
      tags: [system, update]

    - name: Upgrade all Alpine packages
      community.general.apk:
        upgrade: true
      register: apk_upgrade
      tags: [system, update]

    - name: Log system update results
      ansible.builtin.lineinfile:
        path: "{{ maintenance_log }}"
        line: "{{ ansible_date_time.iso8601 }} - System update: {{ apk_upgrade.changed | ternary('Packages upgraded', 'No updates available') }}"
      tags: [maintenance, system]

    # -------------------------
    # Docker Cleanup
    # -------------------------
    - name: Prune Docker system (aggressive cleanup)
      community.docker.docker_prune:
        containers: true
        images: true
        networks: true
        volumes: true
        builder_cache: true
      register: docker_prune
      tags: [docker, cleanup]

    - name: Log Docker cleanup results
      ansible.builtin.lineinfile:
        path: "{{ maintenance_log }}"
        line: "{{ ansible_date_time.iso8601 }} - Docker cleanup: {{ docker_prune.changed | ternary('Cleaned up unused resources', 'No cleanup needed') }}"
      tags: [maintenance, docker]

    # -------------------------
    # Log Management
    # -------------------------
    - name: Find large log files (>1MB)
      ansible.builtin.find:
        paths: /var/log
        patterns: "*.log"
        size: "1m"
        file_type: file
      register: large_logs
      tags: [logs, cleanup]

    - name: Truncate large log files
      ansible.builtin.copy:
        content: ""
        dest: "{{ item.path }}"
        force: yes
        backup: yes
      loop: "{{ large_logs.files }}"
      loop_control:
        label: "{{ item.path }}"
      register: truncated_logs
      when: large_logs.files | length > 0
      tags: [logs, cleanup]

    - name: Log file truncation results
      ansible.builtin.lineinfile:
        path: "{{ maintenance_log }}"
        line: "{{ ansible_date_time.iso8601 }} - Log cleanup: {{ truncated_logs.results | selectattr('changed') | list | length }} files truncated"
      tags: [maintenance, logs]

    # -------------------------
    # Container Health Check
    # -------------------------
    - name: Get all running containers
      community.docker.docker_container_info:
        name: "{{ item }}"
      register: container_status
      loop:
        - traefik
        - caddy
        - php83
        - php74
        - sftp
        - n8n
        - kiddo
        - autoheal
        - beszel-agent
      failed_when: false
      tags: [maintenance, health, containers]

    - name: Report container status
      ansible.builtin.lineinfile:
        path: "{{ maintenance_log }}"
        line: "{{ ansible_date_time.iso8601 }} - Container {{ item.item }}: {{ item.container.State.Status | default('not found') }}"
      loop: "{{ container_status.results }}"
      loop_control:
        label: "{{ item.item }}"
      tags: [maintenance, health]

    # -------------------------
    # Disk Space Check
    # -------------------------
    - name: Check disk space
      ansible.builtin.shell: df -h / | tail -1 | awk '{print $5}' | sed 's/%//'
      register: disk_usage
      changed_when: false
      tags: [maintenance, health, disk]

    - name: Log disk usage
      ansible.builtin.lineinfile:
        path: "{{ maintenance_log }}"
        line: "{{ ansible_date_time.iso8601 }} - Disk usage: {{ disk_usage.stdout }}%"
      tags: [maintenance, disk]

    - name: Alert on high disk usage (>80%)
      ansible.builtin.lineinfile:
        path: "{{ maintenance_log }}"
        line: "{{ ansible_date_time.iso8601 }} - WARNING: High disk usage detected ({{ disk_usage.stdout }}%)"
      when: disk_usage.stdout | int > 80
      tags: [maintenance, disk, alert]

    # -------------------------
    # Log Rotation
    # -------------------------
    - name: Rotate maintenance log if too large
      ansible.builtin.stat:
        path: "{{ maintenance_log }}"
      register: maintenance_log_stat
      tags: [logs, maintenance]

    - name: Backup and truncate maintenance log
      ansible.builtin.copy:
        src: "{{ maintenance_log }}"
        dest: "{{ maintenance_log }}.{{ ansible_date_time.epoch }}"
        remote_src: yes
      when: maintenance_log_stat.stat.exists and maintenance_log_stat.stat.size > 10485760  # 10MB
      tags: [logs, maintenance]

    - name: Truncate maintenance log
      ansible.builtin.copy:
        content: "{{ ansible_date_time.iso8601 }} - Log rotated due to size\n"
        dest: "{{ maintenance_log }}"
      when: maintenance_log_stat.stat.exists and maintenance_log_stat.stat.size > 10485760
      tags: [logs, maintenance]

    - name: Clean old maintenance logs (older than 30 days)
      ansible.builtin.find:
        paths: "/var/log"
        patterns: "mikrus-maintenance.log.*"
        age: "{{ log_retention_days }}d"
      register: old_logs
      tags: [logs, cleanup]

    - name: Remove old maintenance logs
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ old_logs.files }}"
      loop_control:
        label: "{{ item.path }}"
      when: old_logs.files | length > 0
      tags: [logs, cleanup]

    # -------------------------
    # Final Report
    # -------------------------
    - name: Create maintenance summary
      ansible.builtin.lineinfile:
        path: "{{ maintenance_log }}"
        line: "{{ ansible_date_time.iso8601 }} - Weekly maintenance completed successfully"
      tags: [maintenance]

    - name: Display maintenance summary
      ansible.builtin.debug:
        msg: |
          Weekly maintenance completed:
          - System: {{ apk_upgrade.changed | ternary('Updated', 'No updates') }}
          - Docker: {{ docker_prune.changed | ternary('Cleaned', 'No cleanup') }}
          - Logs: {{ truncated_logs.results | selectattr('changed') | list | length }} files truncated
          - Disk usage: {{ disk_usage.stdout }}%
          - Container status logged
      tags: [maintenance, summary]
